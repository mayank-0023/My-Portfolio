  </defs>
  <circle cx="150" cy="150" r="150" fill="url(#background)"/>
  <circle cx="150" cy="150" r="136" fill="none" stroke="#d4af37" stroke-width="5"/>
  <text x="150" y="176" text-anchor="middle" fill="#d4af37"
